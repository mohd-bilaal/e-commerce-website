{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A Django online quiz app with 100 MCQ questions." />
    <title>{% block title %}QuizMaster{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'quiz/css/quiz.css' %}" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{% url 'quiz:start' %}">
        <span>Q</span>
        <b>QuizMaster</b>
      </a>
      <nav>
        <a href="{% url 'quiz:start' %}">Start</a>
        <a href="/admin/">Admin</a>
        <a href="/store/">Store Demo</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script src="{% static 'quiz/js/quiz.js' %}"></script>
  </body>
</html>
